server.port=${GATEWAY_SERVER_PORT:8080}
spring.application.name=gateway
spring.profiles.active=prod
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.url=${SPRING_DATA_REDIS_URL:rediss://localhost:6379}
spring.data.redis.timeout=2000ms

spring.cloud.gateway.mvc.routes[0].id=admin-service
spring.cloud.gateway.mvc.routes[0].uri=lb://admin-service
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=2

spring.cloud.gateway.mvc.routes[1].id=reporting-service
spring.cloud.gateway.mvc.routes[1].uri=lb://reporting-service
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/reporting/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=2

app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8081/eureka}
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${HOSTNAME:localhost}

jwt.access-token-expiry=900
jwt.refresh-token-expiry=604800

spring.threads.virtual.enabled=true

management.endpoints.web.exposure.include=health,info
logging.level.com.rms.gateway=DEBUG

# SameSite: Lax | Strict | None (None requires Secure=true in browsers over HTTPS)
app.cookie.same-site=${COOKIE_SAME_SITE:NONE}
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.path=${COOKIE_PATH:/}
app.cookie.http-only=${COOKIE_HTTP_ONLY:false}

